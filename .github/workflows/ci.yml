name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Lint · Test · Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Install Grafana Alloy
        run: |
          curl -O -L "https://github.com/grafana/alloy/releases/latest/download/alloy-linux-amd64.zip"
          unzip alloy-linux-amd64.zip
          sudo mv alloy-linux-amd64 /usr/local/bin/alloy
          sudo chmod +x /usr/local/bin/alloy

      - name: Check Alloy config
        run: alloy validate infra/alloy/config.alloy

      - name: Run tests
        run: pytest tests/ -v

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/roma-rgb-tech/devsecops-pipeline-demo:${{ github.sha }}
          
          
          
      - name: Trivy — scan filesystem
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Notify Telegram
        if: always()
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} CI — ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}
            Actor: ${{ github.actor }}
