name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/roma-rgb-tech/devsecops-pipeline-demo
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-test:
    name: Lint · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/

      - name: Validate Alloy config
        run: |
          curl -fsSL -o alloy.zip "https://github.com/grafana/alloy/releases/latest/download/alloy-linux-amd64.zip"
          unzip -q alloy.zip
          sudo mv alloy-linux-amd64 /usr/local/bin/alloy
          alloy fmt --check infra/alloy/config.alloy

      - name: Run tests
        run: pytest tests/ -v

  build-and-scan:
    name: Build · Scan · Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Login to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567  # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75  # v5.1.0
        with:
          context: .
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

      - name: Trivy — scan filesystem
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0  # v0.35.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  notify:
    name: Notify Telegram
    runs-on: ubuntu-latest
    needs: [lint-and-test, build-and-scan]
    if: always()
    steps:
      - name: Send notification
        uses: appleboy/telegram-action@fe4e2a3f7f7a239a6ecb5571b79b41a3a96d4c2d  # v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ (needs.lint-and-test.result == 'success' && needs.build-and-scan.result == 'success') && '✅' || '❌' }} CI — ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}
            Actor: ${{ github.actor }}
            Lint/Test: ${{ needs.lint-and-test.result }}
            Build/Scan: ${{ needs.build-and-scan.result }}
